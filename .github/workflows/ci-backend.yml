name: CI Backend

on:
  push:
    branches: [main]
    paths: ["apps/backend/**"]
  pull_request:
    paths: ["apps/backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: inventory
          POSTGRES_DB: inventory_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory -d inventory_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory_dev
      ENVIRONMENT: test
      DEBUG: "false"
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: local-anon-key
      SUPABASE_SERVICE_ROLE_KEY: local-service-role-key
      JWT_SECRET: local-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests --no-cache
      - name: Test
        run: python -m pytest tests -q -p no:cacheprovider
      - name: Migrate database
        run: python -m alembic upgrade head
      - name: Alembic current
        run: python -m alembic current
      - name: Export OpenAPI
        run: python -m scripts.export_openapi
