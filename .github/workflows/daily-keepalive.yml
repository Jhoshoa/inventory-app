name: Daily Keepalive + Exchange Rates

on:
  # Daily cron disabled for now. Keep workflow_dispatch so the keepalive can
  # still be tested manually when the Supabase keepalive/rates flow is resumed.
  # schedule:
  #   - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx
      - run: python scripts/keepalive.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
