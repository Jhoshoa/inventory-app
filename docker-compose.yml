services:
  api:
    build:
      context: apps/backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Inventory API}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required — use your Supabase PostgreSQL connection string}
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      WORKERS: ${WORKERS:-4}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: apps/web
      args:
        NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Inventory App}
        NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3010}
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
        BACKEND_API_URL: ${BACKEND_API_URL:-http://api:8001}
        SENTRY_DSN: ${SENTRY_DSN:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://api:8001}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Inventory App}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3010}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "127.0.0.1:3010:3010"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
